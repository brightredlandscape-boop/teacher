name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Build Web Project
        run: npm run build

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Install ImageMagick (for asset generation)
        run: sudo apt-get install -y imagemagick

      - name: Generate App Icons and Splash Screens
        run: |
          mkdir -p resources
          # Convert SVGs to PNGs for Capacitor Assets if not already present
          if [ ! -f resources/icon.png ]; then
            convert -background none resources/icon.svg resources/icon.png
          fi
          if [ ! -f resources/splash.png ]; then
            convert -background none resources/splash.svg resources/splash.png
          fi
          
      - name: Add Android Platform
        run: |
          if [ ! -d "android" ]; then
            npx cap add android
          else
            echo "Android folder already exists, skipping add."
          fi

      - name: Generate Native Assets
        run: npx @capacitor/assets generate --android

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Build Android APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --stacktrace

      - name: Create GitHub Release
        id: create_release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/heads/main')
        with:
          files: android/app/build/outputs/apk/debug/app-debug.apk
          tag_name: v1.0.${{ github.run_number }}
          name: Release v1.0.${{ github.run_number }}
          body: |
            Automatic build of EduBridge Africa Android APK.
            
            - Built from commit: ${{ github.sha }}
            - Download the APK below.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
